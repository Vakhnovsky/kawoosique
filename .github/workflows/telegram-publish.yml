name: Telegram Rich Publisher

on:
  push:
    branches:
      - main
    paths:
      - 'content/posts/**' # Триггерится только если изменились файлы в папке постов

jobs:
  publish_to_telegram:
    runs-on: ubuntu-latest

    steps:
      # 1. Стягиваем код репозитория (нужна глубина истории коммитов 2, чтобы вычислить разницу)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 2. Разворачиваем Python нужной версии (исправлена опечатка в имени аргумента)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Ставим свежий aiogram 3.29.0+ и парсер YAML
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiogram>=3.29.0 PyYAML

      # 4. Вычисляем, какой именно .md файл был добавлен или изменен в последнем коммите
      - name: Get changed markdown file
        id: changed-files
        run: |
          # Ищем файлы в content/posts/, добавленные (A) или измененные (M), заканчивающиеся на .md
          CHANGED_FILE=$(git diff --name-only HEAD~1 HEAD | grep -E '^content/posts/.*\.md$' | head -n 1)
          echo "FILE_PATH=$CHANGED_FILE" >> $GITHUB_ENV
          echo "Найден файл для обработки: $CHANGED_FILE"

      # 5. Запускаем наш издательский скрипт, если файл был найден
      - name: Run Publisher Script
        if: env.FILE_PATH != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TARGET_MD_FILE: ${{ env.FILE_PATH }}
        run: |
          python tg_publisher.py