name: Publish Post to Telegram

on:
  push:
    paths:
      - 'content/posts/**/*.md' # Сканируем подпапки Page Bundles на любую глубину

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # 1. Забираем код репозитория
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Нужен для git diff, чтобы сравнить текущий коммит с предыдущим

      # 2. Разворачиваем чистый Python (без ломающего сборку кэша)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Установка зависимостей под Bot API 10.1
      - name: Install dependencies
        run: pip install pyyaml aiogram python-frontmatter

      # 4. Вычисляем точное имя измененного файла с защитой от ошибок первой публикации
      - name: Get changed markdown file
        id: changed-files
        run: |
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILE=$(git diff --name-only HEAD~1 HEAD | grep -E '^content/posts/.*\.md$' | head -n 1)
          else
            CHANGED_FILE=$(git ls-files | grep -E '^content/posts/.*\.md$' | head -n 1)
          fi
          echo "TARGET_MD_FILE=$CHANGED_FILE" >> $GITHUB_ENV
          echo "Найден измененный файл: $CHANGED_FILE"

      # 5. Запускаем нашего издателя с передачей ВСЕХ возможных вариантов секретов
      - name: Run publisher script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }} # Обязательно передаем оба секрета в среду!
        run: |
          python tg_publisher.py "$TARGET_MD_FILE"